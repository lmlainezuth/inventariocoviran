<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Inventario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #5a9fd4 0%, #4a8fc7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        
input[type="email"]:focus,
input[type="password"]:focus {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s;
}

input[type="email"]:focus,
input[type="password"]:focus {
    outline: none;
    border-color: #2563eb;
}
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: #1d4ed8;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔐</div>
        <h1>Inventario Coviran</h1>
        <p>Inicia sesión para continuar</p>

<div id="errorMessage" class="error-message">
    Email o contraseña incorrectos.
</div>

<form onsubmit="validateAccess(event)">
    <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" autofocus required>
    </div>
    <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required>
    </div>
    
    <button type="submit" class="btn-login" id="submitBtn">Acceder</button>
</form>
    </div>

    <script>
    const supabaseUrl = 'https://tuqrjktnaptfttqxzvzn.supabase.co';
    const supabaseKey = 'sb_publishable_QZNrwjcdpTOoNzolU8MqOQ_EnO2fxr4';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    // Si ya hay sesión activa, redirigir directamente
    window.addEventListener('DOMContentLoaded', async function() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            localStorage.setItem('inventoryAuth', 'true'); // compat con páginas aún no migradas
            window.location.href = 'index.html';
        }
    });
    
    async function validateAccess(event) {
        event.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Accediendo...';
        errorMessage.classList.remove('show');
        
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) {
            errorMessage.textContent = 'Email o contraseña incorrectos.';
            errorMessage.classList.add('show');
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
            submitBtn.disabled = false;
            submitBtn.textContent = 'Acceder';
            setTimeout(() => errorMessage.classList.remove('show'), 3000);
            return;
        }
        
        localStorage.setItem('inventoryAuth', 'true'); // compat con páginas aún no migradas
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
